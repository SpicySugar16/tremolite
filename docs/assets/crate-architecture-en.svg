<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="900" fill="#FAFAFA"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Title -->
  <!-- ════════════════════════════════════════════ -->
  <text x="500" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#1A1A1A">Tremolite Crate Architecture</text>
  <line x1="350" y1="62" x2="650" y2="62" stroke="#CCC" stroke-width="1"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Layer 1: External Interface Layer (y=90 to y=220) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="90" width="920" height="130" rx="8" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <rect x="40" y="90" width="920" height="36" rx="8" fill="#2C2C2C"/>
  <rect x="40" y="118" width="920" height="8" fill="#2C2C2C"/>
  <text x="60" y="114" font-size="16" font-weight="bold" fill="#FFFFFF">Layer 1 · External Interface Layer</text>
  <text x="925" y="114" text-anchor="end" font-size="11" fill="#AAA">Entry · Protocol · Channels</text>

  <!-- Layer 1 crates -->
  <g filter="url(#shadow)">
    <rect x="60" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="125" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-cli</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="275" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-server</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="425" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-dashboard</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="510" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="575" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-plugin</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="725" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-message</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="810" y="140" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
    <text x="875" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2C">tremolite-channels</text>
  </g>

  <!-- Arrow between Layer 1 and 2 -->
  <line x1="500" y1="222" x2="500" y2="242" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Layer 2: Cognition & Intelligence Layer (y=250 to y=425) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="250" width="920" height="175" rx="8" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <rect x="40" y="250" width="920" height="36" rx="8" fill="#1A1A1A"/>
  <rect x="40" y="278" width="920" height="8" fill="#1A1A1A"/>
  <text x="60" y="274" font-size="16" font-weight="bold" fill="#FFFFFF">Layer 2 · Cognition &amp; Intelligence Layer</text>
  <text x="925" y="274" text-anchor="end" font-size="11" fill="#AAA">LLM · Emotion · Attention · Learning · Reflection</text>

  <!-- Layer 2 crates - Row 1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="125" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-llm</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="275" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-emotion</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="425" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-attention</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="510" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="575" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-learn</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="725" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-reflection</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="810" y="300" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="875" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-distiller</text>
  </g>

  <!-- Layer 2 crates - Row 2 -->
  <g filter="url(#shadow)">
    <rect x="310" y="350" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="375" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-self-learner</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="350" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="625" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A1A">tremolite-compress</text>
  </g>

  <!-- Arrow between Layer 2 and 3 -->
  <line x1="500" y1="427" x2="500" y2="447" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Layer 3: Core Engine (y=455 to y=560) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="455" width="920" height="105" rx="8" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <rect x="40" y="455" width="920" height="36" rx="8" fill="#0D0D0D"/>
  <rect x="40" y="483" width="920" height="8" fill="#0D0D0D"/>
  <text x="60" y="479" font-size="16" font-weight="bold" fill="#FFFFFF">Layer 3 · Core Engine</text>
  <text x="925" y="479" text-anchor="end" font-size="11" fill="#AAA">Phase 10 Main Loop</text>

  <!-- Layer 3 crate - centered, bigger -->
  <g filter="url(#shadow)">
    <rect x="360" y="505" width="280" height="40" rx="8" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="2"/>
    <text x="500" y="531" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D0D0D">tremolite-core</text>
  </g>

  <!-- Arrow between Layer 3 and 4 -->
  <line x1="500" y1="562" x2="500" y2="582" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Layer 4: Planning & Tools Layer (y=590 to y=715) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="590" width="920" height="125" rx="8" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <rect x="40" y="590" width="920" height="36" rx="8" fill="#333"/>
  <rect x="40" y="618" width="920" height="8" fill="#333"/>
  <text x="60" y="614" font-size="16" font-weight="bold" fill="#FFFFFF">Layer 4 · Planning &amp; Tools Layer</text>
  <text x="925" y="614" text-anchor="end" font-size="11" fill="#AAA">Planning · Tools · Delegation · MCP · Cron</text>

  <!-- Layer 4 crates -->
  <g filter="url(#shadow)">
    <rect x="60" y="640" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#333" stroke-width="1.5"/>
    <text x="125" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">tremolite-plan</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="640" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#333" stroke-width="1.5"/>
    <text x="275" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">tremolite-tools</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="640" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#333" stroke-width="1.5"/>
    <text x="425" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">tremolite-delegation</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="510" y="640" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#333" stroke-width="1.5"/>
    <text x="575" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">tremolite-mcp</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="640" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#333" stroke-width="1.5"/>
    <text x="725" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">tremolite-cron</text>
  </g>

  <!-- Arrow between Layer 4 and 5 -->
  <line x1="500" y1="717" x2="500" y2="737" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- Layer 5: System Infrastructure Layer (y=745 to y=845) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="745" width="920" height="100" rx="8" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <rect x="40" y="745" width="920" height="36" rx="8" fill="#555"/>
  <rect x="40" y="773" width="920" height="8" fill="#555"/>
  <text x="60" y="769" font-size="16" font-weight="bold" fill="#FFFFFF">Layer 5 · System Infrastructure Layer</text>
  <text x="925" y="769" text-anchor="end" font-size="11" fill="#AAA">Config · Memory · Session</text>

  <!-- Layer 5 crates -->
  <g filter="url(#shadow)">
    <rect x="160" y="795" width="170" height="34" rx="6" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
    <text x="245" y="818" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">tremolite-config</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="415" y="795" width="170" height="34" rx="6" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
    <text x="500" y="818" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">tremolite-memory</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="670" y="795" width="170" height="34" rx="6" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
    <text x="755" y="818" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">tremolite-session</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- Bottom Legend -->
  <!-- ════════════════════════════════════════════ -->
  <line x1="300" y1="868" x2="700" y2="868" stroke="#CCC" stroke-width="1"/>
  <text x="500" y="888" text-anchor="middle" font-size="14" fill="#555">⚡ Built on Artic Protocol</text>
</svg>
