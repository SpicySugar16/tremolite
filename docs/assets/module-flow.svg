<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Arrow marker for forward flow -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#777777"/>
    </marker>
    <!-- Arrow marker for return flow -->
    <marker id="arrowReturn" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#0d0d0d"/>

  <!-- ===== LAYER 1: External Channel → Engine ===== -->
  <!-- Box: External Channel -->
  <rect x="20" y="55" width="180" height="60" rx="6" ry="6" fill="#1c1c1c" stroke="#555555" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="80" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="11" font-weight="bold">外部通道</text>
  <text x="110" y="97" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9">(QQ Bot / CLI)</text>

  <!-- Step ① -->
  <circle cx="30" cy="45" r="10" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="30" y="49" text-anchor="middle" fill="#888888" font-family="monospace" font-size="11">①</text>

  <!-- Arrow: External Channel → Engine -->
  <line x1="200" y1="85" x2="270" y2="85" stroke="#777777" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Engine -->
  <rect x="270" y="55" width="180" height="60" rx="6" ry="6" fill="#2a2a2a" stroke="#777777" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="78" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="11" font-weight="bold">引擎</text>
  <text x="360" y="97" text-anchor="middle" fill="#888888" font-family="monospace" font-size="9">(SessionScheduler)</text>

  <!-- Step ② -->
  <circle cx="280" cy="45" r="10" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="280" y="49" text-anchor="middle" fill="#888888" font-family="monospace" font-size="11">②</text>

  <!-- ===== LAYER 2: Module Chain (process sequentially) ===== -->
  <!-- Arrow: Engine → Emotion -->
  <line x1="450" y1="85" x2="500" y2="85" stroke="#777777" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Emotion -->
  <rect x="500" y="20" width="130" height="40" rx="6" ry="6" fill="#1c1c1c" stroke="#666666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="45" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="10" font-weight="bold">情绪模块</text>

  <!-- Arrow: Emotion → Memory -->
  <line x1="565" y1="60" x2="565" y2="85" stroke="#777777" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Memory -->
  <rect x="500" y="85" width="130" height="40" rx="6" ry="6" fill="#1c1c1c" stroke="#666666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="110" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="10" font-weight="bold">记忆模块</text>

  <!-- Arrow: Memory → Attention -->
  <line x1="565" y1="125" x2="565" y2="150" stroke="#777777" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Attention -->
  <rect x="500" y="150" width="130" height="40" rx="6" ry="6" fill="#1c1c1c" stroke="#666666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="175" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="10" font-weight="bold">注意力模块</text>

  <!-- Arrow: Attention → LLM -->
  <line x1="565" y1="190" x2="565" y2="215" stroke="#777777" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: LLM Provider -->
  <rect x="500" y="215" width="130" height="40" rx="6" ry="6" fill="#1c1c1c" stroke="#666666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="240" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="10" font-weight="bold">LLM 提供者</text>

  <!-- Step ③ above the module chain -->
  <circle cx="500" cy="12" r="10" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="500" y="16" text-anchor="middle" fill="#888888" font-family="monospace" font-size="11">③</text>

  <!-- Side bracket for module chain -->
  <text x="645" y="130" text-anchor="middle" fill="#666666" font-family="monospace" font-size="9" transform="rotate(90, 645, 130)">顺序处理</text>

  <!-- ===== LAYER 3: Tool Executor side calls ===== -->
  <!-- Dashed line: Emotion → ToolExecutor -->
  <line x1="630" y1="40" x2="700" y2="40" stroke="#777777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <!-- Dashed line: Memory → ToolExecutor -->
  <line x1="630" y1="105" x2="700" y2="105" stroke="#777777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <!-- Dashed line: Attention → ToolExecutor -->
  <line x1="630" y1="170" x2="700" y2="170" stroke="#777777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Box: Tool Executor -->
  <rect x="700" y="20" width="80" height="160" rx="6" ry="6" fill="#1c1c1c" stroke="#555555" stroke-width="1.5" stroke-dasharray="4,2" filter="url(#shadow)"/>
  <text x="740" y="102" text-anchor="middle" fill="#888888" font-family="monospace" font-size="10" font-weight="bold" transform="rotate(90, 740, 102)">工具执行器</text>

  <!-- Step ④ -->
  <circle cx="710" cy="12" r="10" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="710" y="16" text-anchor="middle" fill="#888888" font-family="monospace" font-size="11">④</text>

  <!-- ===== LAYER 4: Response flow back ===== -->
  <!-- Arrow: LLM → Engine (return path) -->
  <path d="M 500 235 L 360 235 L 360 115" fill="none" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>

  <!-- Box: Final Response (on return path) -->
  <rect x="270" y="130" width="180" height="40" rx="6" ry="6" fill="#2a2a2a" stroke="#777777" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="155" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="11" font-weight="bold">最终回复</text>

  <!-- Step ⑤ -->
  <circle cx="280" cy="120" r="10" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="280" y="124" text-anchor="middle" fill="#888888" font-family="monospace" font-size="11">⑤</text>

  <!-- Arrow: Engine → External Channel (return) -->
  <line x1="270" y1="150" x2="200" y2="150" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>

  <path d="M 200 150 L 200 85" fill="none" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>

  <!-- ===== Labels on arrows ===== -->
  <!-- Top arrow label: Send Message -->
  <text x="235" y="75" text-anchor="middle" fill="#777777" font-family="monospace" font-size="8">发送消息</text>

  <!-- Return arrow label -->
  <text x="235" y="130" text-anchor="middle" fill="#666666" font-family="monospace" font-size="8">回复</text>

  <!-- Title -->
  <text x="400" y="310" text-anchor="middle" fill="#999999" font-family="monospace" font-size="13" font-weight="bold">透闪石模块消息流</text>
  <text x="400" y="330" text-anchor="middle" fill="#666666" font-family="monospace" font-size="9">黑白灰架构图</text>

  <!-- Legend -->
  <rect x="250" y="345" width="300" height="40" rx="4" ry="4" fill="none" stroke="#444444" stroke-width="0.5"/>
  <text x="400" y="360" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8">— 实线：正向数据流  |  - - 虚线：返回流  |  ·· 虚框：可选组件</text>
  <text x="400" y="375" text-anchor="middle" fill="#888888" font-family="monospace" font-size="8">工具箭头已省略以保持清晰</text>
</svg>
