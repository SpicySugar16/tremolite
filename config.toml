[core]
data_dir = "./data/tremolite"
# soul_path = "./SOUL.md"

[llm]
default = "deepseek"

[llm.providers.deepseek]
type = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
model = "deepseek-v4-flash"

[llm.providers.openai]
type = "openai"
api_key = "${SILICONFLOW_API_KEY}"
model = "BAAI/bge-m3"
base_url = "https://api.siliconflow.cn/v1"

[embedding]
api_base = "https://api.siliconflow.cn/v1"
api_key = "${SILICONFLOW_API_KEY}"
model = "BAAI/bge-m3"

[channels]
[channels.webhook]
type = "http"
listen = "0.0.0.0:9091"

[channels.qqbot_test]
type = "qqbot"
app_id = "${QQ_APP_ID}"
client_secret = "${QQ_CLIENT_SECRET}"
production = false
name = "qqbot_test"

[cron]
enabled = true
